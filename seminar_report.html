<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인재성장팀 세미나 보고 상세</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        /* --- 대시보드와 동일한 16:9 전체 스크롤 차단 설정 [1] --- */
        body {
            margin: 0; padding: 16px;
            box-sizing: border-box;
            height: 100vh;
            overflow: hidden;
            font-family: 'Pretendard', sans-serif;
            background-color: #f4f7f9; color: #2c3e50;
        }

        /* --- 전체 레이아웃 구성을 위한 그리드 시스템 [2] --- */
        .report-container {
            display: grid;
            grid-template-columns: 1.2fr 1fr; /* 좌측(진행사항)과 우측(비품) 분할 */
            grid-template-rows: auto 1fr; /* 헤더와 본문 분할 */
            gap: 16px;
            height: 100%;
        }

        /* --- 공통 박스 스타일 [3] --- */
        .box {
            background-color: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 12px rgba(149, 157, 165, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header-section { grid-column: 1 / 3; border-left: 5px solid #3b82f6; }
        
        h1 { margin: 0; font-size: 1.5rem; color: #111827; }
        h2 { font-size: 1.2rem; color: #111827; margin: 0 0 15px 0; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; flex-shrink: 0; }

        /* --- 내부 스크롤 영역 설정 [4] --- */
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* --- 이미지 및 콘텐츠 그리드 [5-7] --- */
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .img-container {
            background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 8px;
            height: 220px; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .item-card {
            border: 1px solid #f1f5f9; background: #fff;
            border-radius: 10px; padding: 15px; margin-bottom: 12px;
            display: flex; gap: 15px; align-items: center;
        }
        .item-thumb { width: 120px; height: 120px; background: #f8fafc; border-radius: 6px; overflow: hidden; flex-shrink: 0; }
        .item-thumb img { width: 100%; height: 100%; object-fit: contain; }
        
        .badge { display: inline-block; padding: 3px 8px; background: #eff6ff; color: #3b82f6; border-radius: 6px; font-weight: 700; font-size: 0.85rem; }
        .issue-desc { background: #fef2f2; color: #ef4444; padding: 12px; border-radius: 8px; font-size: 0.9rem; margin-top: 10px; }

        /* 스크롤바 디자인 [2] */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body>

<div class="report-container">
    <!-- 헤더 영역 [8] -->
    <div class="box header-section">
        <h1>인재성장팀 세미나 보고</h1>
        <div style="font-size: 0.95rem; color: #64748b; margin-top: 5px;">2026년 3월 4주차 | 발표자: 류원준 선임연구원</div>
    </div>

    <!-- 좌측: 사이니지 진행사항 및 이슈 [5, 6] -->
    <div class="box">
        <h2>1. 이동식 사이니지 진행사항</h2>
        <div class="scroll-area">
            <p><strong>1) 설치 현황 (3/24 완료)</strong></p>
            <div class="photo-grid">
                <div class="img-container"><img src="images/slide2_1.png"></div>
                <div class="img-container"><img src="images/slide2_2.png"></div>
            </div>

            <p><strong>2) 패널 결함 보고 (미세 세로줄 현상)</strong></p>
            <div class="photo-grid">
                <div class="img-container"><img src="images/slide3_issue1.png"></div>
                <div class="img-container"><img src="images/slide3_issue2.png"></div>
            </div>
            <div class="issue-desc">
                - <strong>조치 사항:</strong> 중고 패널 사용으로 인한 수리 예정 (예상 수리비: 200)
            </div>
        </div>
    </div>

    <!-- 우측: 비품 도입 검토 목록 [7, 9-13] -->
    <div class="box">
        <h2>2. 비품 도입 검토</h2>
        <div class="scroll-area">
            <!-- 수납 선반 A -->
            <div class="item-card">
                <div class="item-thumb"><img src="images/slide4.png"></div>
                <div>
                    <span class="badge">비품 1</span>
                    <div style="font-weight: 700; margin: 5px 0;">수납 선반 (A)</div>
                    <div style="font-size: 0.85rem; color: #64748b;">2400*270*2000 / 25만 / 1주일 소요</div>
                </div>
            </div>
            <!-- 반유리 장식장 블랙 -->
            <div class="item-card">
                <div class="item-thumb"><img src="images/slide6.png"></div>
                <div>
                    <span class="badge">비품 2</span>
                    <div style="font-weight: 700; margin: 5px 0;">반유리 장식장 (블랙)</div>
                    <div style="font-size: 0.85rem; color: #64748b;">1600*400*1900 / 80만</div>
                </div>
            </div>
            <!-- 잡지 거치대 -->
            <div class="item-card">
                <div class="item-thumb"><img src="images/slide8.png"></div>
                <div>
                    <span class="badge">비품 3</span>
                    <div style="font-weight: 700; margin: 5px 0;">잡지 거치대</div>
                    <div style="font-size: 0.85rem; color: #64748b;">1540*87*1520 / 45만</div>
                </div>
            </div>
            <!-- 추가 비품 카드를 이곳에 배치 -->
        </div>
    </div>
</div>

</body>
</html>
